name: Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          name="ghcr.io/${GITHUB_REPOSITORY,,}"
          sha="${GITHUB_SHA:0:7}"
          echo "image=${name}:sha-${sha}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<TAGS"
            echo "${name}:sha-${sha}"
            echo "${name}:latest"
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event.pull_request.merged == true
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy compose file to server
        run: |
          ssh deploy-target 'mkdir -p ~/juji-discord-bot'
          IMAGE="${IMAGE}" envsubst '${IMAGE}' < docker-compose.prod.yml \
            | ssh deploy-target 'cat > ~/juji-discord-bot/docker-compose.yml'

      - name: Write server .env from GitHub secrets
        run: |
          ssh deploy-target 'umask 077; cat > ~/juji-discord-bot/.env' <<EOF
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          EOF

      - name: Deploy
        run: |
          ssh deploy-target bash -s <<EOF
          set -euo pipefail
          cd ~/juji-discord-bot
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose pull
          docker compose up -d
          docker image prune -f
          docker logout ghcr.io
          EOF
