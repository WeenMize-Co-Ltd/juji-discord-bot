name: Release & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        run: |
          name="ghcr.io/${GITHUB_REPOSITORY,,}"
          v="${{ needs.release.outputs.version }}"
          minor="${v%.*}"
          major="${v%%.*}"
          echo "image=${name}:${v}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<TAGS"
            echo "${name}:${v}"
            echo "${name}:${minor}"
            echo "${name}:${major}"
            echo "${name}:latest"
            echo "TAGS"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [release, build-and-push]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /usr/local/bin/cloudflared
          sudo chmod +x /usr/local/bin/cloudflared
          cloudflared --version

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${SSH_HOST}
            User ${SSH_USER}
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking accept-new
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy compose file to server
        run: |
          ssh deploy-target 'mkdir -p ~/juji-discord-bot'
          IMAGE="${IMAGE}" envsubst '${IMAGE}' < docker-compose.prod.yml \
            | ssh deploy-target 'cat > ~/juji-discord-bot/docker-compose.yml'
          # Lavalink mounts this; ship it alongside the compose file.
          ssh deploy-target 'cat > ~/juji-discord-bot/application.yml' < application.yml

      - name: Write server .env from GitHub secrets
        run: |
          ssh deploy-target 'umask 077; cat > ~/juji-discord-bot/.env' <<EOF
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          API_PORT=${{ secrets.API_PORT }}
          API_CORS_ORIGINS=${{ secrets.API_CORS_ORIGINS }}
          OLLAMA_HOST=${{ secrets.OLLAMA_HOST }}
          OLLAMA_MODEL=${{ secrets.OLLAMA_MODEL }}
          LLM_TIMEOUT_MS=${{ secrets.LLM_TIMEOUT_MS }}
          LLM_MAX_INPUT_CHARS=${{ secrets.LLM_MAX_INPUT_CHARS }}
          OLLAMA_NUM_CTX=${{ secrets.OLLAMA_NUM_CTX }}
          LLM_ENABLED=${{ secrets.LLM_ENABLED }}
          LAVALINK_PASSWORD=${{ secrets.LAVALINK_PASSWORD }}
          SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}
          EOF

      - name: Deploy
        run: |
          ssh deploy-target bash -s <<EOF
          set -euo pipefail
          cd ~/juji-discord-bot
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose pull
          docker compose up -d
          docker image prune -f
          docker logout ghcr.io
          EOF

  notify:
    needs: [release, build-and-push, deploy]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord release notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.release.outputs.version }}
          NOTES: ${{ needs.release.outputs.notes }}
          IMAGE: ${{ needs.build-and-push.outputs.image }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          truncated_notes=$(echo "$NOTES" | head -c 1000)
          payload=$(jq -n \
            --arg title "Juji v${VERSION} deployed" \
            --arg url "https://github.com/${REPO}/releases/tag/v${VERSION}" \
            --arg notes "$truncated_notes" \
            --arg image "$IMAGE" \
            --arg actor "$ACTOR" \
            --arg repo "$REPO" \
            --arg version "v${VERSION}" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                color: 5763719,
                description: $notes,
                fields: [
                  { name: "Image", value: ("`" + $image + "`"), inline: false },
                  { name: "Deployed by", value: ("[" + $actor + "](https://github.com/" + $actor + ")"), inline: true },
                  { name: "Release", value: ("[" + $version + "](https://github.com/" + $repo + "/releases/tag/" + $version + ")"), inline: true }
                ],
                footer: { text: "semantic-release" },
                timestamp: (now | todate)
              }]
            }')
          curl -fsSL -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
