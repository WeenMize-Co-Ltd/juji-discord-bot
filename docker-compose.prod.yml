services:
  juji-discord-bot:
    image: ${IMAGE}
    restart: unless-stopped
    depends_on:
      - ollama
      - lavalink
    env_file:
      - .env
    pull_policy: always
    networks:
      - juji-network

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    pull_policy: always
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_CONTEXT_LENGTH=4096
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - juji-network

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    restart: unless-stopped
    pull_policy: always
    environment:
      # Modest heap for the CPU-only host shared with Ollama (the docs' 6G is far too big here).
      - _JAVA_OPTIONS=-Xmx512m
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_PASSWORD:-youshallnotpass}
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml:ro
    networks:
      - juji-network

volumes:
  ollama_models:

networks:
  juji-network:
    external: true
